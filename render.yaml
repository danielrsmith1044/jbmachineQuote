# Render infrastructure-as-code: https://render.com/docs/blueprint-spec
#
# Free-tier demo configuration. IMPORTANT CAVEATS:
# - Render's free plan has an EPHEMERAL filesystem with no persistent disk,
#   so the SQLite database and uploaded drawings are wiped on every
#   container restart (each deploy, each cold start after 15 min of idle).
# - The app auto-seeds the starter materials catalog on each fresh DB, so
#   cold starts land on a usable app — but any quotes or settings changes
#   made during a session will be lost on the next restart.
# - Free services also spin down after 15 min of inactivity; the first
#   request after that takes ~30 seconds to wake up.
#
# To move to persistent storage later: change `plan: free` to `plan: standard`
# and re-add the `disk:` block (see git history for the previous config).
#
# Set AUTH_USER and AUTH_PASS in the Render dashboard after first deploy to
# require HTTP basic auth. Without them the URL is public.

services:
  - type: web
    name: jbmachine-quoter
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NODE_ENV
        value: production
      - key: AUTH_USER
        sync: false # set in dashboard — leave blank to run open
      - key: AUTH_PASS
        sync: false # set in dashboard — leave blank to run open
